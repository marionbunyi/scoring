<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Classroom Game!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=700&display=swap');

        :root {
            --bg-color: #FFDE4D;
            --team-a: #FF6B6B;
            --team-b: #4D96FF;
            --team-c: #6BCB77;
            --text-dark: #2C3E50;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Fredoka One', cursive;
            text-shadow: 3px 3px 0px #fff;
            color: var(--text-dark);
            text-align: center;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }

        /* Navigation Bar */
        nav {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            justify-content: center;
        }

        nav button {
            background: #fff;
            border: 3px solid var(--text-dark);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        nav button:hover {
            transform: scale(1.05);
        }

        nav button.active {
            background: #FF9F43;
            color: white;
            border-color: #FF9F43;
            box-shadow: 0 4px 0px #d35400;
        }

        /* Pages */
        .page {
            display: none;
            width: 100%;
            max-width: 800px;
            background: white;
            border: 6px solid var(--text-dark);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 12px 0px rgba(0,0,0,0.15);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .page.active-page {
            display: block;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* PAGE 1: TEAMS */
        .teams-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .team-box {
            border: 4px solid var(--text-dark);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }

        .team-box h3 { font-size: 2rem; margin: 0 0 15px 0; color: white; text-shadow: 2px 2px 0px var(--text-dark); }
        .box-a { background: var(--team-a); }
        .box-b { background: var(--team-b); }
        .box-c { background: var(--team-c); }

        .name-list {
            background: rgba(255,255,255,0.7);
            border-radius: 12px;
            padding: 10px;
            min-height: 120px;
            list-style: none;
            margin: 0;
            font-size: 1.3rem;
            font-weight: bold;
        }
        .name-list li {
            padding: 8px 5px;
            border-bottom: 2px dashed rgba(0,0,0,0.1);
        }
        .name-list li:last-child { border-bottom: none; }

        /* PAGE 2: ROULETTE */
        .roulette-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .timer-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
            background: #f1f2f6;
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid var(--text-dark);
        }

        .timer-btn {
            background: white;
            border: 2px solid var(--text-dark);
            padding: 6px 14px;
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            border-radius: 15px;
            cursor: pointer;
        }

        .timer-btn.selected {
            background: #4D96FF;
            color: white;
            border-color: #4D96FF;
            box-shadow: 0 3px 0px #2457a6;
        }

        #wheel-display {
            width: 260px;
            height: 260px;
            background: #FF9F43;
            border: 8px solid var(--text-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: white;
            text-shadow: 3px 3px 0px var(--text-dark);
            box-shadow: 0 10px 0px rgba(0,0,0,0.15);
            text-align: center;
            padding: 20px;
        }

        .spin-animation {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
            100% { transform: rotate(-0deg) scale(1); }
        }

        .action-btn {
            background: #FF6B6B;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            padding: 15px 40px;
            border: 4px solid var(--text-dark);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px var(--text-dark);
            transition: all 0.1s;
        }

        .action-btn:active {
            margin-top: 8px;
            box-shadow: 0 0px 0px var(--text-dark);
        }

        /* PAGE 3: SCORING */
        .score-board {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            border: 4px solid var(--text-dark);
            border-radius: 20px;
            color: white;
        }

        .score-name {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            text-shadow: 2px 2px 0px var(--text-dark);
        }

        .score-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-number {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            text-shadow: 2px 2px 0px var(--text-dark);
            min-width: 70px;
            text-align: center;
        }

        .math-btn {
            background: #FFF;
            color: var(--text-dark);
            border: 3px solid var(--text-dark);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0px var(--text-dark);
        }
        .math-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px var(--text-dark);
        }
        .minus-btn {
            background: #f1f2f6;
            font-size: 2rem;
        }

        /* PAGE 4: SETTINGS */
        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .settings-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .settings-input-group label {
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
        }
        .settings-input-group input {
            border: 3px solid var(--text-dark);
            border-radius: 15px;
            padding: 12px;
            font-size: 1.1rem;
            outline: none;
        }
        .save-btn {
            background: #6BCB77;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            padding: 12px;
            border: 4px solid var(--text-dark);
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0px var(--text-dark);
            margin-top: 10px;
        }
        .save-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px var(--text-dark);
        }
    </style>
</head>
<body>

    <h1>🎈 FUN CLASS GAME! 🎈</h1>

    <nav>
        <button id="nav-teams" class="active" onclick="switchPage('teams')">👥 Teams</button>
        <button id="nav-roulette" onclick="switchPage('roulette')">🎡 Name Roulette</button>
        <button id="nav-scoring" onclick="switchPage('scoring')">🏆 Scoreboard</button>
        <button id="nav-settings" onclick="switchPage('settings')">⚙️ Settings</button>
    </nav>

    <div id="page-teams" class="page active-page">
        <h2>👥 Meet the Teams!</h2>
        <div class="teams-container">
            <div class="team-box box-a">
                <h3>TEAM A</h3>
                <ul class="name-list" id="list-team-a"></ul>
            </div>
            <div class="team-box box-b">
                <h3>TEAM B</h3>
                <ul class="name-list" id="list-team-b"></ul>
            </div>
            <div class="team-box box-c">
                <h3>TEAM C</h3>
                <ul class="name-list" id="list-team-c"></ul>
            </div>
        </div>
    </div>

    <div id="page-roulette" class="page">
        <h2>🎡 Who Will It Be?</h2>
        <div class="roulette-wrapper">
            <div class="timer-selector">
                <button id="t-1" class="timer-btn" onclick="setTimer(1)">1 Sec</button>
                <button id="t-3" class="timer-btn selected" onclick="setTimer(3)">3 Sec</button>
                <button id="t-5" class="timer-btn" onclick="setTimer(5)">5 Sec</button>
            </div>
            <div id="wheel-display">READY?</div>
            <button class="action-btn" onclick="startRoulette()">SPIN! 🚀</button>
        </div>
    </div>

    <div id="page-scoring" class="page">
        <h2>🏆 Scoreboard</h2>
        <div class="score-board">
            <div class="score-row box-a">
                <span class="score-name">TEAM A</span>
                <div class="score-controls">
                    <button class="math-btn minus-btn" onclick="adjustPoint('a', -1)">–</button>
                    <span class="score-number" id="score-a">0</span>
                    <button class="math-btn" onclick="adjustPoint('a', 1)">+</button>
                </div>
            </div>
            <div class="score-row box-b">
                <span class="score-name">TEAM B</span>
                <div class="score-controls">
                    <button class="math-btn minus-btn" onclick="adjustPoint('b', -1)">–</button>
                    <span class="score-number" id="score-b">0</span>
                    <button class="math-btn" onclick="adjustPoint('b', 1)">+</button>
                </div>
            </div>
            <div class="score-row box-c">
                <span class="score-name">TEAM C</span>
                <div class="score-controls">
                    <button class="math-btn minus-btn" onclick="adjustPoint('c', -1)">–</button>
                    <span class="score-number" id="score-c">0</span>
                    <button class="math-btn" onclick="adjustPoint('c', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <h2>⚙️ Type Kid Names Here</h2>
        <p style="text-align: center; font-weight: bold; color: #7f8c8d;">Separate names with commas (,)</p>
        <div class="settings-grid">
            <div class="settings-input-group">
                <label style="color: var(--team-a)">🔴 Team A Names:</label>
                <input type="text" id="input-team-a" value="Shalman, Daniel, Jean, Rex, Momo, Oscar, Ryan, Yuri">
            </div>
            <div class="settings-input-group">
                <label style="color: var(--team-b)">🔵 Team B Names:</label>
                <input type="text" id="input-team-b" value="Chris, Ocean, Dora, Josh, Kevin, Running, Yunin, Layla">
            </div>
            <div class="settings-input-group">
                <label style="color: var(--team-c)">🟢 Team C Names:</label>
                <input type="text" id="input-team-c" value="Tristan, Ellis, Mia, Ellie, Jay, Cici, Oliver, Ariel">
            </div>
            <button class="save-btn" onclick="saveSettings()">Save & Update Game! ✨</button>
        </div>
    </div>

    <script>
        let teamANames = [];
        let teamBNames = [];
        let teamCNames = [];
        let allNames = [];
        let currentDurationSeconds = 3;
        let scores = { a: 0, b: 0, c: 0 };
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Fast roulette tick sound
        function playTickSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // Winning Chime Fanfare
        function playWinSound() {
            initAudio();
            let now = audioCtx.currentTime;
            let notes = [523.25, 659.25, 783.99]; 
            notes.forEach((freq, index) => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now + (index * 0.12));
                gain.gain.setValueAtTime(0.15, now + (index * 0.12));
                gain.gain.exponentialRampToValueAtTime(0.01, now + (index * 0.12) + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.12));
                osc.stop(now + (index * 0.12) + 0.4);
            });
        }

        // NEW: Plus Score Audio Sound (Happy bright ding!)
        function playPlusSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High pitch A5 note
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // NEW: Minus Score Audio Sound (Dull low boop)
        function playMinusSound() {
            initAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime); // Low pitch A3 note
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function initGame() {
            saveSettings(); 
        }

        function saveSettings() {
            teamANames = document.getElementById('input-team-a').value.split(',').map(n => n.trim()).filter(n => n !== "");
            teamBNames = document.getElementById('input-team-b').value.split(',').map(n => n.trim()).filter(n => n !== "");
            teamCNames = document.getElementById('input-team-c').value.split(',').map(n => n.trim()).filter(n => n !== "");

            populateList('list-team-a', teamANames);
            populateList('list-team-b', teamBNames);
            populateList('list-team-c', teamCNames);

            allNames = [...teamANames, ...teamBNames, ...teamCNames];
            document.getElementById('wheel-display').innerText = allNames.length > 0 ? "READY?" : "NO NAMES!";
            switchPage('teams');
        }

        function populateList(elementId, namesArray) {
            const list = document.getElementById(elementId);
            if (namesArray.length === 0) {
                list.innerHTML = `<li style="color:#aaa; font-style:italic;">Empty</li>`;
            } else {
                list.innerHTML = namesArray.map(name => `<li>${name}</li>`).join('');
            }
        }

        function setTimer(seconds) {
            currentDurationSeconds = seconds;
            document.querySelectorAll('.timer-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`t-${seconds}`).classList.add('selected');
        }

        function switchPage(pageName) {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pageName}`).classList.add('active-page');
            document.getElementById(`nav-${pageName}`).classList.add('active');
        }

        let isSpinning = false;
        function startRoulette() {
            if (isSpinning) return;
            if (allNames.length === 0) {
                alert("Please add some names in the Settings tab first!");
                return;
            }
            initAudio();
            isSpinning = true;
            const display = document.getElementById('wheel-display');
            display.classList.add('spin-animation');

            let interval = setInterval(() => {
                const randomName = allNames[Math.floor(Math.random() * allNames.length)];
                display.innerText = randomName;
                playTickSound();
            }, 90);

            setTimeout(() => {
                clearInterval(interval);
                display.classList.remove('spin-animation');
                const winner = allNames[Math.floor(Math.random() * allNames.length)];
                display.innerText = winner;
                playWinSound();
                isSpinning = false;
            }, currentDurationSeconds * 1000);
        }

        // Updated points module to handle sound feedback triggers
        function adjustPoint(team, amount) {
            scores[team] += amount;
            
            // Check if subtraction or addition was made to select sound
            if (amount > 0) {
                playPlusSound();
            } else if (amount < 0 && scores[team] >= 0) {
                // Only play sound if score didn't lock at zero anyway
                playMinusSound();
            }

            if (scores[team] < 0) scores[team] = 0; 
            document.getElementById(`score-${team}`).innerText = scores[team];
        }

        initGame();
    </script>
</body>
</html>
